<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>冰點冷氣維修系統 v20 Learning</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:#eef5f9;color:#172330}
#app{min-height:100dvh;display:flex;flex-direction:column}
header{height:56px;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#fff;border-bottom:1px solid #d7e3ec;position:sticky;top:0;z-index:5}
h1{font-size:17px;margin:0} small{color:#657583}.badge{background:#eaf7ff;border:1px solid #bfe4f8;border-radius:12px;padding:5px 9px;font-weight:900}
main{flex:1;display:flex;flex-direction:column;min-height:0}
#scene{flex:1;min-height:330px;position:relative;background:#dcecf5;overflow:hidden;border-bottom:1px solid #ccdbe6}
#scene svg{width:100%;height:100%;display:block}
#bottom{height:345px;background:#fff;display:flex;flex-direction:column;border-top:1px solid #d7e3ec}
.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:6px;background:#f7fbfe}
.tab{border:1px solid #d5e2eb;background:#fff;border-radius:10px;padding:8px 4px;font-size:12px;font-weight:900}
.tab.on{background:#1f8acb;color:white}
.panel{flex:1;min-height:0;overflow:auto;padding:8px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.btn{border:0;background:#1f8acb;color:#fff;border-radius:12px;padding:10px;font-size:14px;font-weight:900;margin:3px}
.btn2{background:#eaf1f6;color:#1d2733}.warn{background:#b76d0c}.danger{background:#a72121}
.card{background:#fff;border:1px solid #dbe7ef;border-radius:12px;padding:8px;margin:5px 0;font-size:13px;line-height:1.4}
.bigcard{background:#fff;border:1px solid #dbe7ef;border-radius:16px;padding:14px;margin:12px;font-size:15px;line-height:1.5;box-shadow:0 8px 22px #22334418}
.data{background:#f7fbfe;border:1px solid #dbe7ef;border-radius:10px;padding:7px;margin:5px 0;font-size:12px;line-height:1.4}
.statusGrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.statusItem{background:#f7fbfe;border:1px solid #dbe7ef;border-radius:10px;padding:7px;font-size:12px;line-height:1.35}
.statusItem b{display:block;color:#27455c}
.tool{border:1px solid #cbd9e4;background:#fff;border-radius:10px;padding:8px;text-align:left;font-weight:900;font-size:12px}
.tool.on{background:#1f8acb;color:#fff}.tool small{display:block;color:#607080;font-weight:400}.tool.on small{color:#e7f8ff}
.spot{position:absolute;border:2px solid #177bc0;background:#ffffffdd;border-radius:999px;padding:7px 9px;font-weight:900;font-size:13px;box-shadow:0 4px 10px #0002}
.display{fill:#10202c;stroke:#456;stroke-width:3}.tiny{font-size:11px;fill:#37e1ff}
.pcb{fill:#1d5a3e;stroke:#103423;stroke-width:3}.whiteLabel{font-size:12px;fill:#fff}.label{font-size:12px;fill:#122}
.burn{fill:#1d1d1d}.normal{fill:#dff7e9;stroke:#2ca25f;stroke-width:2}.bad{fill:#111;stroke:#777;stroke-width:2}
.gauge{fill:none;stroke:#2499df;stroke-width:14}.needle{stroke:#1a3346;stroke-width:5;stroke-linecap:round}
.filterDirt{fill:#5d5142;opacity:.7}.filterClean{fill:#dff7e9;stroke:#2ca25f}
.ventBad{fill:#c0392b;opacity:.35}
.toast{position:fixed;left:10px;right:10px;bottom:356px;background:#142231;color:#d9f5ff;border-radius:12px;padding:10px;z-index:10;font-size:13px;box-shadow:0 8px 24px #0004}
.logline{border-left:4px solid #1f8acb;padding:4px 6px;margin:4px 0;background:#f7fbfe;border-radius:6px;font-size:12px}
.gameover{background:#2a1015;color:#ffe8e8;border-color:#c33}
.ok{color:#168a4a;font-weight:900}.dangerText{color:#c82333;font-weight:900}
@media(min-width:850px){#app{height:100vh} main{display:grid;grid-template-columns:1fr 420px}#scene{min-height:0;height:calc(100vh - 56px);border-right:1px solid #ccdbe6}#bottom{height:calc(100vh - 56px);border-top:0}.toast{left:auto;right:440px;bottom:18px;width:360px}}
</style>
</head>
<body>
<div id="app">
<header><div><h1>冰點冷氣維修系統</h1><small>v20 學習模式</small></div><div class="badge" id="score">0</div></header>
<main>
<section id="scene"></section>
<section id="bottom">
<div class="tabs">
<button class="tab on" onclick="tab='tools';draw()">工具</button>
<button class="tab" onclick="tab='status';draw()">現況</button>
<button class="tab" onclick="tab='repair';draw()">維修</button>
<button class="tab" onclick="tab='log';draw()">紀錄</button>
<button class="tab" onclick="tab='case';draw()">工單</button>
</div>
<div class="panel" id="panel"></div>
</section>
</main>
</div>

<script>
const cases=[
{id:'CASE001',name:'D6｜電容故障',fault:'cap',code:'D6',desc:'昨天正常，今天不冷，外機嗡嗡約3秒後停止。'},
{id:'CASE002',name:'D6｜保險絲燒毀',fault:'fuse',code:'D6',desc:'外機無反應，室內機可開，外機板保險絲可能開路。'},
{id:'CASE003',name:'D6｜機板燒毀',fault:'board',code:'D6',desc:'外機不啟動，曾聞到焦味，控制板區有焦黑。'},
{id:'CASE004',name:'D6｜壓縮機卡死',fault:'compressor',code:'D6',desc:'外機啟動瞬間大電流，壓縮機不轉，保護停機。'},
{id:'CASE005',name:'熱交換不良｜濾網髒',fault:'filter',code:'D6',desc:'室內風量變小，回風不足，熱交換差造成保護。'}
];
let selectedCase=null, view='select', tab='case', actionLog=[], gameOver=false;
const required=['ticket','env','display','listen','powerCheck','voltageOut','current','pressure','ohm','capTest','filterCheck','root','repair','retest','listenFixed','restore'];
let s={breaker:true,power:false,ladder:false,belt:false,indoorOpen:false,outdoorOpen:false,tool:'',mode:'',target:'',
ticket:false,env:false,display:false,listen:false,listenFixed:false,powerCheck:false,voltageOut:false,voltageIn:false,current:false,pressure:false,ohm:false,capTest:false,filterCheck:false,filterClean:false,root:false,repair:false,retest:false,restore:false,
fixed:false,cap:false,fuse:false,board:false,compressor:false};
function resetState(){actionLog=[];s={breaker:true,power:false,ladder:false,belt:false,indoorOpen:false,outdoorOpen:false,tool:'',mode:'',target:'',
ticket:false,env:false,display:false,listen:false,listenFixed:false,powerCheck:false,voltageOut:false,voltageIn:false,current:false,pressure:false,ohm:false,capTest:false,filterCheck:false,filterClean:false,root:false,repair:false,retest:false,restore:false,
fixed:false,cap:false,fuse:false,board:false,compressor:false};}
function chooseCase(i){resetState();selectedCase=cases[i];view='site';tab='case';log('選擇 '+selectedCase.name,'ticket');draw();}
function score(){let done=required.filter(k=>s[k]).length;let v=Math.round(done/required.length*100);document.getElementById('score').textContent=v;return v;}
function log(msg, mark){actionLog.push({n:actionLog.length+1,msg,mark});if(mark)s[mark]=true;score();drawPanelOnly();}
function say(x){let d=document.createElement('div');d.className='toast';d.textContent=x;document.body.appendChild(d);setTimeout(()=>d.remove(),2300);}
function hazard(t,m){gameOver=true;document.getElementById('scene').innerHTML=`<div class="card gameover"><h2>GAME OVER｜${t}</h2><p>${m}</p><button class="btn" onclick="location.reload()">重新開始</button></div>`;document.getElementById('bottom').style.display='none';document.getElementById('score').textContent='0';}
function statusText(){if(!selectedCase)return '未選';return s.fixed?'正常':(s.power?selectedCase.code:'OFF');}
function showCode(){return statusText();}
function sceneSelect(){return `<div class="bigcard"><h2>選擇狀況題</h2><p>固定學習模式：一題一個主故障，評分看你有沒有完成排除流程。</p>${cases.map((c,i)=>`<button class="btn2 btn" onclick="chooseCase(${i})">${c.id} ${c.name}</button>`).join('')}</div>`;}
function sceneSite(){return `<svg viewBox="0 0 600 430"><rect width="600" height="430" fill="#dcecf5"/><rect y="305" width="600" height="125" fill="#c8d7df"/><rect x="50" y="70" width="185" height="58" rx="14" fill="#fff" stroke="#789"/><rect x="72" y="87" width="145" height="24" rx="6" class="display"/><text x="118" y="106" class="tiny">${s.fixed?'18°C OK':(s.power?'18°C '+selectedCase.code:'OFF')}</text><rect x="380" y="235" width="150" height="96" rx="12" fill="#f7f7f7" stroke="#678"/><circle cx="455" cy="283" r="34" fill="none" stroke="#789" stroke-width="8"/><rect x="365" y="225" width="190" height="115" class="ventBad"/><path d="${s.ladder?'M520 305 l40 -95 l20 0 l-40 95':'M520 305 l35 -65 l18 0 l-35 65'}" fill="#d7e0e5" stroke="#789" stroke-width="4"/></svg>
<button class="spot" style="left:8%;top:18%" onclick="clickPoint('display')">面板</button>
<button class="spot" style="left:17%;top:34%" onclick="openIndoor()">內機</button>
<button class="spot" style="left:64%;top:55%" onclick="openOutdoor()">外機</button>
<button class="spot" style="left:58%;top:22%" onclick="listen()">聽聲音</button>
<button class="spot" style="left:80%;top:66%" onclick="setLadder()">架梯</button>
<button class="spot" style="left:68%;top:66%" onclick="setBelt()">安全帶</button>`;}
function sceneIndoor(){return `<svg viewBox="0 0 560 430"><rect width="560" height="430" fill="#edf6fb"/><rect x="35" y="55" width="490" height="310" rx="24" fill="#fff" stroke="#789" stroke-width="3"/><rect x="92" y="108" width="380" height="45" class="${s.filterClean?'filterClean':'filterDirt'}"/><text x="215" y="136" font-size="18" fill="${s.filterClean?'#145':'#fff'}">${s.filterClean?'濾網已清洗':'濾網髒污'}</text></svg>
<button class="spot" style="left:36%;top:32%" onclick="clickPoint('indoorV')">內機端子</button>
<button class="spot" style="left:40%;top:42%" onclick="checkFilter()">濾網</button>
<button class="spot" style="left:55%;top:42%" onclick="cleanFilter()">清洗</button>`;}
function sceneOutdoor(){return `<svg viewBox="0 0 700 500"><rect width="700" height="500" fill="#edf6fb"/><rect x="25" y="24" width="650" height="448" rx="20" fill="#f8fafb" stroke="#789" stroke-width="3"/><rect x="45" y="45" width="350" height="270" rx="14" class="pcb"/><text x="150" y="72" class="whiteLabel">室外控制板</text><rect x="80" y="95" width="75" height="45" fill="#eee" stroke="#555"/><text x="88" y="121" class="label">AC IN</text><rect x="80" y="155" width="75" height="45" fill="#eee" stroke="#555"/><text x="88" y="181" class="label">COMP</text><rect x="218" y="165" width="42" height="30" class="${s.board||s.fixed?'normal':'burn'}"/><rect x="282" y="165" width="70" height="35" class="${s.fuse||s.board||s.fixed?'normal':'bad'}"/><text x="293" y="188" font-size="12" fill="${s.fuse||s.board||s.fixed?'#145':'#fff'}">FUSE</text><rect x="430" y="60" width="190" height="155" rx="12" fill="#dff1f8" stroke="#789"/><path d="M455 205 A75 75 0 0 1 605 205" class="gauge"/><line x1="530" y1="205" x2="500" y2="${s.fixed?'130':'165'}" class="needle"/><rect x="430" y="260" width="170" height="90" rx="10" fill="#fff2cc" stroke="#9b7"/></svg>
<button class="spot" style="left:15%;top:24%" onclick="clickPoint('outV')">AC端子</button>
<button class="spot" style="left:15%;top:37%" onclick="clickPoint('compOhm')">壓縮機</button>
<button class="spot" style="left:42%;top:36%" onclick="clickPoint('fuse')">保險絲</button>
<button class="spot" style="left:29%;top:37%" onclick="clickPoint('board')">機板</button>
<button class="spot" style="left:72%;top:63%" onclick="clickPoint('cap')">電容</button>
<button class="spot" style="left:64%;top:76%" onclick="clickPoint('current')">電流</button>
<button class="spot" style="left:78%;top:44%" onclick="clickPoint('pressure')">壓力</button>`;}
function drawScene(){document.getElementById('scene').innerHTML=view==='select'?sceneSelect():view==='indoor'?sceneIndoor():view==='outdoor'?sceneOutdoor():sceneSite();}
function drawPanelOnly(){drawPanel(); if(view!=='select')drawScene(); score();}
function drawPanel(){document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',['tools','status','repair','log','case'][i]===tab));let p=document.getElementById('panel');
if(view==='select'){p.innerHTML='<div class="data">請先選擇一題開始練習。</div>';return;}
if(tab==='tools')p.innerHTML=`<div class="card"><b>工具 → 模式 → 點畫面位置</b><br>目前：${toolName(s.tool)} / ${s.mode||'未選'} / ${s.target||'未選'}</div><div class="row">${['clamp','meter','capmeter','gauge'].map(id=>`<button class="tool ${s.tool===id?'on':''}" onclick="pickTool('${id}')">${toolName(id)}<small>${toolDesc(id)}</small></button>`).join('')}</div><div class="card"><b>模式</b></div><div class="row">${modes().map(m=>`<button class="tool ${s.mode===m?'on':''}" onclick="s.mode='${m}';draw()">${m}</button>`).join('')}</div><div class="data"><b>名牌</b><br>FU-52HSG / R32<br>額定 6.8A｜最大 9.8A</div>`;
else if(tab==='status')p.innerHTML=`<div class="statusGrid">
<div class="statusItem"><b>故障碼</b>${showCode()}</div><div class="statusItem"><b>聲音</b>${s.fixed?'穩定運轉聲':(s.power?'嗡3秒停':'無運轉聲')}</div>
<div class="statusItem"><b>電流</b>${s.fixed?'6.2A':(s.current?'18A→0A':'未量')}</div><div class="statusItem"><b>壓力</b>${s.fixed?'118 psi':(s.pressure?'160 psi':'未量')}</div>
<div class="statusItem"><b>安全帶</b>${s.belt?'已掛':'未掛'}</div><div class="statusItem"><b>主故障</b>隱藏，結案才檢討</div>
<div class="statusItem"><b>修復</b>${s.fixed?'已修復':'未修復'}</div><div class="statusItem"><b>學習原則</b>先排除，不背答案</div></div>`;
else if(tab==='repair')p.innerHTML=`<div class="row"><button class="btn" onclick="replacePart('cap')">更換電容</button><button class="btn" onclick="replacePart('fuse')">更換保險絲</button><button class="btn" onclick="replacePart('board')">更換機板</button><button class="btn" onclick="replacePart('compressor')">更換壓縮機</button><button class="btn2 btn" onclick="retest()">斷電重開複測</button></div><div class="data">修復不等於滿分；未量測、未查根因、未復原都會扣分。</div>`;
else if(tab==='log')p.innerHTML=actionLog.map(x=>`<div class="logline">${x.n}. ${x.msg}</div>`).join('')||'<div class="data">尚無動作紀錄</div>';
else p.innerHTML=`<div class="card"><b>維修單</b><br>${selectedCase.id} ${selectedCase.name}<br>冰點 FU-52HSG / R32<br>故障碼：${showCode()}<br>${selectedCase.desc}</div><div class="data"><b>學習提示：</b>先問「有沒有運轉、電有沒有到、壓縮機有沒有做功、哪些數據支持你的假設」。</div><button class="btn2 btn" onclick="envCheck()">案場環境</button><button class="warn btn" onclick="s.power=!s.power;log(s.power?'遙控開機':'遙控關機');draw()">遙控開關</button><button class="danger btn" onclick="location.reload()">放棄/重新開始</button><button class="btn" onclick="finish()">結案檢討</button>`;
}
function draw(){drawScene();drawPanel();score();}
function toolName(id){return {clamp:'勾表',meter:'三用電表',capmeter:'電容表',gauge:'壓力錶'}[id]||'未選';}
function toolDesc(id){return {clamp:'ACV/DCV/ACA/Ω',meter:'ACV/DCV/Ω',capmeter:'µF',gauge:'壓力值'}[id]||'';}
function modes(){if(s.tool==='clamp')return ['ACV','DCV','ACA','Ω','通斷'];if(s.tool==='meter')return ['ACV','DCV','Ω','通斷'];if(s.tool==='capmeter')return ['µF'];if(s.tool==='gauge')return ['壓力'];return ['未選'];}
function pickTool(id){s.tool=id;s.mode=modes()[0];draw();}
function clickPoint(t){s.target=t;
if(t==='display'){log('查看室內顯示面板：'+showCode(),'display');return;}
if(t==='indoorV'){if((s.tool==='meter'||s.tool==='clamp')&&s.mode==='DCV'){log('量內機控制電壓：18V','voltageIn')}else say('內機控制端請用 DCV');return;}
if(t==='outV'){if((s.tool==='meter'||s.tool==='clamp')&&s.mode==='ACV'){log('量外機 AC：220V','voltageOut')}else say('外機AC請用ACV');return;}
if(t==='compOhm'){if(s.breaker){hazard('觸電危險','送電狀態量壓縮機阻值。');return;}if((s.tool==='meter'||s.tool==='clamp')&&(s.mode==='Ω'||s.mode==='通斷')){let bad=selectedCase.fault==='compressor';log(bad?'量壓縮機阻值：1-2 0.2Ω / 2-3 0.4Ω / 1-3 0.6Ω / 對地5MΩ':'量壓縮機阻值：1-2 1.2Ω / 2-3 2.8Ω / 1-3 4.0Ω / 對地OL','ohm')}else say('請用Ω/通斷');return;}
if(t==='fuse'){log('檢查保險絲：'+(selectedCase.fault==='fuse'&&!s.fuse&&!s.board?'OL/外觀發黑':'導通正常'));return;}
if(t==='board'){log('檢查機板：'+(selectedCase.fault==='board'&&!s.board?'橋整附近焦黑':'外觀正常'),'root');return;}
if(t==='cap'){if(s.breaker){hazard('電容危險','送電狀態拆測電容。');return;}if(s.tool==='capmeter'&&s.mode==='µF'){log('測電容：'+(selectedCase.fault==='cap'&&!s.cap?'5.1µF 容量不足':'34.8µF 正常'),'capTest')}else say('請用電容表 µF');return;}
if(t==='current'){if(!(s.tool==='clamp'&&s.mode==='ACA')){say('勾電流要用勾表 ACA');return;}if(!s.power)log('量電流：0A');else if(s.fixed)log('量電流：6.2A','current');else log('量電流：18A→0A','current');return;}
if(t==='pressure'){if(!(s.tool==='gauge'&&s.mode==='壓力')){say('請用壓力錶');return;}log('壓力表：'+(s.fixed?'118 psi':'160 psi'),'pressure');return;}
}
function envCheck(){log('案場環境：外機高度3.6m、內機2.8m、回風空間需檢查','env');}
function setLadder(){s.ladder=true;log('架設梯子');}
function setBelt(){if(!s.ladder){say('先架梯子');return;}s.belt=true;log('穿戴安全帶並掛固定點');}
function openIndoor(){if(!s.ladder){say('內機2.8m，先架梯子');return;}view='indoor';s.indoorOpen=true;log('打開內機外蓋');draw();}
function openOutdoor(){if(!s.ladder){say('外機3.6m，先架梯子');return;}view='outdoor';s.outdoorOpen=true;log('打開外機機殼');draw();}
function listen(){if(!s.power){log('聽聲音：無運轉聲','listen');return;}if(s.fixed){log('聽聲音：外機穩定運轉聲','listenFixed');return;}log('聽聲音：嗡～～約3秒停止','listen');}
function checkFilter(){s.filterCheck=true;let bad=selectedCase.fault==='filter';log(bad?'檢查濾網：嚴重髒污、回風不足':'檢查濾網：輕微髒污','filterCheck');}
function cleanFilter(){s.filterClean=true;log('清洗濾網：回風改善');}
function replacePart(p){if(s.breaker){hazard('觸電危險','送電狀態更換零件。');return;}s[p]=true;if(p==='board')s.fuse=true;log('更換'+({cap:'電容',fuse:'保險絲',board:'機板',compressor:'壓縮機'}[p]),'repair');}
function retest(){s.breaker=false;log('斷電等待後重開');s.breaker=true;s.power=true;let ok=(selectedCase.fault==='cap'&&s.cap)||(selectedCase.fault==='fuse'&&(s.fuse||s.board))||(selectedCase.fault==='board'&&s.board)||(selectedCase.fault==='compressor'&&s.compressor)||(selectedCase.fault==='filter'&&s.filterClean);if(ok){s.fixed=true;log('複測：故障碼消失，外機穩定運轉','retest')}else log('複測：仍未完全修復，故障碼可能存在');draw();}
function finish(){let miss=[];required.forEach(a=>{if(!s[a])miss.push(a)});let fixed=s.fixed;document.getElementById('scene').innerHTML=`<div class="card"><h2>結案檢討</h2><p><b>${score()} 分</b></p><p>${fixed?'<span class="ok">已修復主要故障</span>':'<span class="dangerText">尚未修復主要故障</span>'}</p><p><b>本題主故障：</b>${selectedCase.name}</p>${miss.map(m=>`<p class="dangerText">• 未完成：${m}</p>`).join('')||'<p class="ok">流程完整</p>'}</div>`;tab='log';drawPanel();}
draw();
</script>
</body>
</html>
