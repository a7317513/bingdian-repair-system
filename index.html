<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/><title>冰點冷氣維修系統 v21</title><style>
*{box-sizing:border-box}body{margin:0;background:#0d1720;color:#eaf4ff;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif}#app{min-height:100dvh;display:flex;flex-direction:column}header{height:56px;display:flex;gap:10px;align-items:center;padding:8px 10px;background:#0b1219;border-bottom:1px solid #243445;position:sticky;top:0;z-index:5}h1{font-size:17px;margin:0;flex:1}.back,.btn{border:0;border-radius:10px;padding:9px 10px;font-weight:900;background:#146dc1;color:#fff}.back{background:#142b45;border:1px solid #31618f}.pill{border:1px solid #2d4962;border-radius:12px;padding:5px 8px;background:#102235;font-weight:900}main{flex:1;display:flex;flex-direction:column}#scene{flex:1;min-height:360px;background:#101d28;position:relative;overflow:hidden}#bottom{height:335px;background:#111c26;border-top:1px solid #2d4053;display:flex;flex-direction:column}.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:6px;background:#0b1219}.tab{border:1px solid #263b50;background:#101d28;color:#d8e9f7;border-radius:10px;padding:8px 4px;font-size:12px;font-weight:900}.tab.on{background:#1264b0;color:#fff}.panel{flex:1;overflow:auto;padding:8px}.card,.data{background:#111f2c;border:1px solid #2a4054;border-radius:12px;padding:8px;margin:6px 0;font-size:13px;line-height:1.45}.bigcard{background:#111f2c;border:1px solid #2a4054;border-radius:16px;padding:14px;margin:12px;line-height:1.55}.row{display:grid;grid-template-columns:1fr 1fr;gap:6px}.btn2{background:#26394b}.danger{background:#a72121}.warn{background:#b76d0c}.tool{border:1px solid #36506a;background:#0f1d29;color:#eaf4ff;border-radius:10px;padding:8px;text-align:left;font-weight:900;font-size:12px}.tool.on{background:#146dc1}.tool small{display:block;color:#a9bdcf}.statusGrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}.statusItem{background:#0f1d29;border:1px solid #2a4054;border-radius:10px;padding:7px;font-size:12px}.statusItem b{display:block;color:#83caff}.logline{border-left:4px solid #1495ff;background:#0f1d29;border-radius:6px;margin:4px 0;padding:5px 7px;font-size:12px}.pcbWrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:8px}.pcbImg{max-width:100%;max-height:100%;object-fit:contain;border-radius:10px}.spot{position:absolute;border:2px solid #49aeff;background:#071523cc;color:#fff;border-radius:999px;padding:7px 9px;font-weight:900;font-size:13px}.gaugeBox{height:100%;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,#15293b,#071018)}.gaugeWrap{position:relative;width:min(92vw,520px);aspect-ratio:1}.gaugeWrap img{width:100%;height:100%;object-fit:contain}.needle{position:absolute;left:50%;top:50%;width:39%;height:5px;background:#fff;border-radius:999px;transform-origin:left center;box-shadow:0 0 6px #000}.hub{position:absolute;left:48%;top:48%;width:4%;aspect-ratio:1;border-radius:50%;background:#c9b37d;border:2px solid #67552f}.cycle{width:100%;height:100%;background:#071018;padding:8px}.cycle svg{width:100%;height:100%}.ok{color:#49d38a}.toast{position:fixed;left:10px;right:10px;bottom:345px;background:#06111b;color:#d9f5ff;border:1px solid #34506a;border-radius:12px;padding:10px;z-index:10;font-size:13px}@media(min-width:900px){#app{height:100vh}main{display:grid;grid-template-columns:1fr 420px}#scene{height:calc(100vh - 56px)}#bottom{height:calc(100vh - 56px);border-top:0;border-left:1px solid #2d4053}.toast{right:440px;bottom:18px;width:360px;left:auto}}
</style></head><body><div id="app"><header><button class="back" onclick="goBack()">← 返回</button><h1>冰點冷氣維修系統 v21</h1><div class="pill" id="score">0</div></header><main><section id="scene"></section><section id="bottom"><div class="tabs"><button class="tab on" onclick="tab='tools';draw()">工具</button><button class="tab" onclick="tab='status';draw()">現況</button><button class="tab" onclick="tab='repair';draw()">維修</button><button class="tab" onclick="tab='log';draw()">紀錄</button><button class="tab" onclick="tab='case';draw()">工單</button></div><div class="panel" id="panel"></div></section></main></div><script>
const cases=[{id:'CASE001',title:'D6｜外機嗡3秒停',fault:'cap',desc:'昨天正常，今天不冷；內機有風，外機嗡嗡約3秒停止。'},{id:'CASE002',title:'D6｜外機無反應',fault:'fuse',desc:'內機可開，外機無反應，需從電源與機板保險絲排查。'},{id:'CASE003',title:'D6｜聞到焦味',fault:'board',desc:'昨天曾聞到焦味，今天不冷。外機板需檢查。'}];
let view='select',tab='case',history=[],selected=null,logList=[],s={};function reset(){s={tool:'',mode:'',power:false,fixed:false,cap:false,fuse:false,board:false,ticket:false,env:false,display:false,listen:false,voltage:false,current:false,pressure:false,ohm:false,root:false,repair:false,retest:false};logList=[]}reset();
function choose(i){reset();selected=cases[i];s.ticket=true;log('選擇 '+selected.id+' '+selected.title);view='site';tab='case';draw()}function push(v){history.push(view);view=v;draw()}function goBack(){if(history.length){view=history.pop();draw()}else if(view!=='select'){view='select';draw()}}function log(t,k){logList.push((logList.length+1)+'. '+t);if(k)s[k]=true;drawPanel();score()}function score(){let r=['env','display','listen','voltage','current','pressure','ohm','root','repair','retest'];document.getElementById('score').textContent=Math.round(r.filter(k=>s[k]).length/r.length*100)}function toast(t){let d=document.createElement('div');d.className='toast';d.textContent=t;document.body.appendChild(d);setTimeout(()=>d.remove(),2200)}
function drawScene(){let el=document.getElementById('scene');if(view==='select'){el.innerHTML='<div class="bigcard"><h2>選擇狀況題</h2><p>學習模式：不顯示主故障，結案才檢討。</p>'+cases.map((c,i)=>`<button class="btn btn2" onclick="choose(${i})">${c.id}｜${c.title}</button>`).join('')+'</div>';return}if(view==='site'){el.innerHTML=`<div class="bigcard"><h2>${selected.id}｜${selected.title}</h2><p>${selected.desc}</p><div class="row"><button class="btn" onclick="point('display')">看室內面板</button><button class="btn" onclick="listen()">聽聲音</button><button class="btn btn2" onclick="push('outdoor')">打開外機</button><button class="btn btn2" onclick="push('indoor')">打開內機</button><button class="btn btn2" onclick="push('gauge')">接壓力錶</button><button class="btn btn2" onclick="push('cycle')">看循環圖</button></div></div>`;return}if(view==='outdoor'){el.innerHTML='<div class="pcbWrap"><img class="pcbImg" src="assets/outdoor_pcb.jpg"></div><button class="spot" style="left:12%;top:29%" onclick="point(\'fan\')">風扇接頭</button><button class="spot" style="left:72%;top:20%" onclick="point(\'comp\')">壓縮機接頭</button><button class="spot" style="left:24%;top:70%" onclick="point(\'eev\')">電子膨脹閥</button><button class="spot" style="left:46%;top:73%" onclick="point(\'sensor\')">溫度接頭</button><button class="spot" style="left:58%;top:72%" onclick="point(\'current\')">電流偵測</button><button class="spot" style="left:75%;top:52%" onclick="point(\'board\')">機板區</button>';return}if(view==='indoor'){el.innerHTML='<div class="pcbWrap"><img class="pcbImg" src="assets/indoor_pcb.jpg"></div><button class="spot" style="left:76%;top:29%" onclick="point(\'indoorFan\')">風扇接頭</button><button class="spot" style="left:71%;top:56%" onclick="point(\'pipeSensor\')">盤管sensor</button><button class="spot" style="left:73%;top:62%" onclick="point(\'roomSensor\')">環境sensor</button>';return}if(view==='gauge'){let deg=s.fixed?-28:(s.power?-10:-12);el.innerHTML=`<div class="gaugeBox"><div class="gaugeWrap"><img src="assets/gauge.jpg"><div class="needle" style="transform:rotate(${deg}deg)"></div><div class="hub"></div></div></div><button class="spot" style="left:38%;bottom:7%" onclick="point('pressure')">記錄指針位置</button>`;return}if(view==='cycle'){el.innerHTML='<div class="cycle"><svg viewBox="0 0 900 520"><rect width="900" height="520" fill="#071018"/><text x="330" y="42" fill="#eaf4ff" font-size="28">分離式冷氣 R32 循環圖</text><rect x="80" y="330" width="250" height="80" rx="20" fill="none" stroke="#ff5d88" stroke-width="12"/><text x="120" y="455" fill="#ff87a6" font-size="24">室外機：冷凝器</text><circle cx="120" cy="260" r="48" fill="#111" stroke="#ddd"/><text x="72" y="230" fill="#fff" font-size="20">壓縮機</text><rect x="560" y="315" width="70" height="100" rx="15" fill="none" stroke="#ff5d88" stroke-width="10"/><text x="625" y="365" fill="#ff87a6" font-size="22">乾燥過濾器</text><circle cx="690" cy="230" r="34" fill="#333" stroke="#ddd"/><text x="720" y="238" fill="#fff" font-size="22">電子膨脹閥</text><rect x="300" y="85" width="300" height="75" rx="20" fill="none" stroke="#4bb8ff" stroke-width="12"/><text x="350" y="70" fill="#8ed8ff" font-size="24">室內機：蒸發器</text><path d="M170 260 L170 130 L300 130" stroke="#4bb8ff" stroke-width="10" fill="none"/><path d="M600 130 L690 130 L690 200" stroke="#4bb8ff" stroke-width="10" fill="none"/><path d="M690 260 L690 365 L630 365" stroke="#ff5d88" stroke-width="10" fill="none"/><path d="M560 365 L330 365" stroke="#ff5d88" stroke-width="10" fill="none"/><path d="M80 365 L120 310" stroke="#ff5d88" stroke-width="10" fill="none"/></svg></div>';return}}
function drawPanel(){document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',['tools','status','repair','log','case'][i]===tab));let p=document.getElementById('panel');if(view==='select'){p.innerHTML='<div class="data">先選擇案例。</div>';return}if(tab==='tools'){p.innerHTML='<div class="card"><b>工具 → 模式 → 點真實位置</b><br>目前：'+toolName(s.tool)+' / '+(s.mode||'未選')+'</div><div class="row">'+['clamp','meter','capmeter','gauge'].map(id=>`<button class="tool ${s.tool===id?'on':''}" onclick="pickTool('${id}')">${toolName(id)}<small>${toolDesc(id)}</small></button>`).join('')+'</div><div class="card"><b>模式</b></div><div class="row">'+modes().map(m=>`<button class="tool ${s.mode===m?'on':''}" onclick="s.mode='${m}';draw()">${m}</button>`).join('')+'</div><div class="data"><b>名牌</b><br>FU-52HSG / R32<br>額定 6.8A｜最大 9.8A</div>';return}if(tab==='status'){p.innerHTML='<div class="statusGrid"><div class="statusItem"><b>故障碼</b>'+(s.fixed?'正常':(s.power?'D6':'OFF'))+'</div><div class="statusItem"><b>壓力錶</b>'+(s.pressure?'已記錄指針':'未接')+'</div><div class="statusItem"><b>電流</b>'+(s.current?(s.fixed?'6.2A':'18A→0A'):'未量')+'</div><div class="statusItem"><b>學習</b>結案才公布答案</div></div>';return}if(tab==='repair'){p.innerHTML='<div class="row"><button class="btn" onclick="repair(\'cap\')">更換電容</button><button class="btn" onclick="repair(\'fuse\')">更換保險絲</button><button class="btn" onclick="repair(\'board\')">更換機板</button><button class="btn btn2" onclick="retest()">斷電重開複測</button></div><div class="data">目前不顯示高空/燒焊安全流程；等冷媒章節再加入。</div>';return}if(tab==='log'){p.innerHTML=logList.map(x=>`<div class="logline">${x}</div>`).join('')||'<div class="data">尚無紀錄</div>';return}p.innerHTML='<div class="card"><b>維修單</b><br>'+selected.id+'｜'+selected.title+'<br>'+selected.desc+'</div><button class="btn btn2" onclick="log(\'檢查案場環境與機器狀況\',\'env\')">案場環境</button><button class="btn warn" onclick="s.power=!s.power;log(s.power?\'遙控開機\':\'遙控關機\')">遙控開關</button><button class="btn btn2" onclick="push(\'cycle\')">循環圖</button><button class="btn danger" onclick="location.reload()">重新開始</button><button class="btn" onclick="finish()">結案檢討</button>'}
function draw(){drawScene();drawPanel();score()}function pickTool(id){s.tool=id;s.mode=modes()[0];draw()}function toolName(id){return {clamp:'勾表',meter:'三用電表',capmeter:'電容表',gauge:'壓力錶'}[id]||'未選'}function toolDesc(id){return {clamp:'ACV/DCV/ACA/Ω',meter:'ACV/DCV/Ω',capmeter:'µF',gauge:'真實圓盤判讀'}[id]||''}function modes(){if(s.tool==='clamp')return ['ACV','DCV','ACA','Ω','通斷'];if(s.tool==='meter')return ['ACV','DCV','Ω','通斷'];if(s.tool==='capmeter')return ['µF'];if(s.tool==='gauge')return ['壓力'];return ['未選']}
function point(x){if(x==='display'){log('查看室內顯示：'+(s.fixed?'正常':'D6'),'display');return}if(x==='pressure'){if(s.tool!=='gauge'){toast('請先選壓力錶');return}s.pressure=true;log('讀取圓盤壓力錶指針','pressure');return}if(x==='current'){if(!(s.tool==='clamp'&&s.mode==='ACA')){toast('請用勾表 ACA');return}s.current=true;log(s.fixed?'勾電流：6.2A':'勾電流：18A→0A','current');return}if(x==='comp'){if(s.tool==='meter'||s.tool==='clamp'){if(s.mode==='ACV')log('壓縮機接頭供電檢查','voltage');else if(s.mode==='Ω'||s.mode==='通斷')log('壓縮機腳位 1-2 / 2-3 / 1-3 / 對地量測','ohm');else toast('壓縮機接頭請用 ACV 或 Ω/通斷')}else toast('請先選儀表');return}if(x==='board'){log('檢查外機機板與接頭位置','root');return}log('點選 '+x)}function listen(){s.listen=true;log(s.fixed?'聽聲音：外機穩定運轉':'聽聲音：嗡嗡約3秒停止','listen')}function repair(p){s[p]=true;if(p==='board')s.fuse=true;log('維修：'+({cap:'更換電容',fuse:'更換保險絲',board:'更換機板'}[p]),'repair')}function retest(){let ok=(selected.fault==='cap'&&s.cap)||(selected.fault==='fuse'&&s.fuse)||(selected.fault==='board'&&s.board);s.power=true;if(ok){s.fixed=true;log('斷電重開複測：故障碼消失，運轉正常','retest')}else log('斷電重開複測：仍未修復');draw()}function finish(){let ans={cap:'電容故障',fuse:'保險絲燒毀',board:'機板燒毀'}[selected.fault];document.getElementById('scene').innerHTML='<div class="card"><h2>結案檢討</h2><p><b>本題主故障：</b>'+ans+'</p><p><b>分數：</b>'+document.getElementById('score').textContent+'</p><p class="ok">重點是完成排除流程，不是猜答案。</p></div>';tab='log';drawPanel()}draw();
</script></body></html>
